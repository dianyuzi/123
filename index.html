
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      background: #111;
      cursor: pointer;
    }

    .player::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      opacity: 0.8;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 2;
    }

    .play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 24px solid rgba(255,255,255,0.9);
      margin-left: 5px;
    }

    .player:hover .play-btn {
      background: rgba(255,255,255,0.25);
      transform: translate(-50%, -50%) scale(1.1);
    }

    .bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      display: flex;
      align-items: flex-end;
      padding: 0 12px 8px;
      gap: 8px;
      z-index: 2;
    }

    .progress {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #fff;
    }

    .time {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="player" onclick="play()">
    <div class="play-btn" id="btn"></div>
    <div class="bar">
      <div class="progress"><div class="progress-fill" id="fill"></div></div>
      <span class="time" id="time">0:00</span>
    </div>
  </div>

  <audio id="audio">
    <source src="audio.flac" type="audio/flac">
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const btn   = document.getElementById('btn');
    const fill  = document.getElementById('fill');
    const time  = document.getElementById('time');

    function play() {
      if (audio.paused) {
        audio.play();
        btn.style.opacity = '0';
      }
    }

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      fill.style.width = pct + '%';
      const s = Math.floor(audio.currentTime);
      time.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    });
  </script>

</body>
</html>
